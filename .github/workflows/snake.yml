name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: weldamlak
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=#3B82F6&color_dots=#1E3A5F,#2563EB,#3B82F6,#60A5FA,#93C5FD

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          mkdir -p dist
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg 2>/dev/null || true
          cp dist/github-contribution-grid-snake-dark.svg github-contribution-grid-snake-dark.svg 2>/dev/null || true
          cp dist/github-contribution-grid-snake.gif github-contribution-grid-snake.gif 2>/dev/null || true
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg github-contribution-grid-snake.gif
          git commit -m 'Update snake animation' || echo "No changes to commit"
          git push

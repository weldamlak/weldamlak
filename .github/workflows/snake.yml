name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: weldamlak
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          SNAKE_COLOR: "#3B82F6"
          SNAKE_COLOR_DOTS: "#93C5FD"
          SNAKE_ANIMATION: "snake"
          SNAKE_SPEED: "3"

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git commit -m 'Update snake animation' || echo "No changes to commit"
          git push
